# content/BasePack/biomes/overworld_biomes.yml
#
# Two-axis biome table: elevation + moisture (Whittaker-style).
#
# LOOKUP RULES:
#   - The generator picks the NARROWEST moisture-range biome whose elevation AND
#     moisture ranges both contain the sampled values.
#   - Biomes with MoistureMin=0/MoistureMax=1 act as catch-all for their elevation band.
#   - Within each land band, list moisture-specific variants AFTER the catch-all.
#     They are automatically preferred because they have a narrower moisture range.
#
# MOISTURE GUIDE (PrevailingWindAngleDeg = 225 = SW trade winds by default):
#   0.0 - 0.35 = dry / leeward / rain shadow
#   0.35 - 0.65 = transitional / mixed
#   0.65 - 1.0  = wet / windward / tropical
#
# ELEVATION BANDS (do NOT overlap between bands):
#   0.00 - 0.22  deep water (ocean floor)
#   0.22 - 0.30  shallow water / reef zone
#   0.30 - 0.37  beach / shoreline  (coastal)
#   0.37 - 0.52  low land           (plains, scrub, mangrove edges)
#   0.52 - 0.68  mid land           (forest, grassland, savanna)
#   0.68 - 0.82  highland           (hills, dense forest, cloud forest)
#   0.82 - 1.00  peaks              (bare rock, volcanic summit)

schema: biome_defs.v1
biomes:

  # ── Ocean ─────────────────────────────────────────────────────────
  - id: base:deep_water
    name: "Deep Water"
    tileId: base:water
    elevationMin: 0.00
    elevationMax: 0.22
    walkable: false
    tags: [natural, liquid, ocean]

  - id: base:shallow_water
    name: "Shallow Water"
    tileId: base:shallow_water
    elevationMin: 0.22
    elevationMax: 0.30
    walkable: false
    tags: [natural, liquid, shallow, coastal]

  # ── Shoreline (0.30 - 0.37) ───────────────────────────────────────
  # Catch-all: sandy beach (dry / leeward side)
  - id: base:beach
    name: "Beach"
    tileId: base:beach
    elevationMin: 0.30
    elevationMax: 0.37
    moistureMin: 0.00
    moistureMax: 1.00
    walkable: true
    tags: [natural, coastal]

  # Dry coast: rocky cliffs on exposed windward or high-falloff shores
  - id: base:rocky_cliff
    name: "Rocky Cliffs"
    tileId: base:rocky_cliff
    elevationMin: 0.30
    elevationMax: 0.37
    moistureMin: 0.00
    moistureMax: 0.35
    walkable: false
    tags: [natural, coastal, cliff, impassable]

  # Wet shoreline: windward coast grows mangroves instead of open sand
  - id: base:mangrove_coast
    name: "Mangrove Coast"
    tileId: base:mangrove
    elevationMin: 0.30
    elevationMax: 0.37
    moistureMin: 0.65
    moistureMax: 1.00
    walkable: false
    tags: [natural, coastal, wet, dense]

  # ── Low Land  (0.37 - 0.52) ───────────────────────────────────────
  # Catch-all: dry scrubland (leeward / rain shadow floor)
  - id: base:scrubland
    name: "Scrubland"
    tileId: base:dirt
    elevationMin: 0.37
    elevationMax: 0.52
    moistureMin: 0.00
    moistureMax: 1.00
    walkable: true
    tags: [natural, arid, lowland]

  # Transitional: open savanna / dry grassland
  - id: base:savanna
    name: "Savanna"
    tileId: base:savanna
    elevationMin: 0.37
    elevationMax: 0.52
    moistureMin: 0.30
    moistureMax: 0.60
    walkable: true
    tags: [natural, temperate, lowland]

  # Wet: tropical lowland / jungle floor
  - id: base:tropical_lowland
    name: "Tropical Lowland"
    tileId: base:jungle_floor
    elevationMin: 0.37
    elevationMax: 0.52
    moistureMin: 0.60
    moistureMax: 1.00
    walkable: true
    tags: [natural, tropical, wet, lowland]

  # ── Mid Land  (0.52 - 0.68) ───────────────────────────────────────
  # Catch-all: temperate grassland
  - id: base:grassland
    name: "Grassland"
    tileId: base:grass
    elevationMin: 0.52
    elevationMax: 0.68
    moistureMin: 0.00
    moistureMax: 1.00
    walkable: true
    tags: [natural, temperate, midland]

  # Dry mid: dry forest / woodland
  - id: base:dry_forest
    name: "Dry Forest"
    tileId: base:dry_forest
    elevationMin: 0.52
    elevationMax: 0.68
    moistureMin: 0.25
    moistureMax: 0.55
    walkable: true
    tags: [natural, temperate, midland, forest]

  # Wet mid: dense rainforest
  - id: base:rainforest
    name: "Rainforest"
    tileId: base:rainforest
    elevationMin: 0.52
    elevationMax: 0.68
    moistureMin: 0.55
    moistureMax: 1.00
    walkable: true
    tags: [natural, tropical, wet, midland, forest, dense]

  # ── Highland  (0.68 - 0.82) ───────────────────────────────────────
  # Catch-all: rocky highland / dirt hills
  - id: base:dirt_hills
    name: "Dirt Hills"
    tileId: base:dirt
    elevationMin: 0.68
    elevationMax: 0.82
    moistureMin: 0.00
    moistureMax: 1.00
    walkable: true
    tags: [natural, highland]

  # Dry highland: volcanic scrub / lava field edges
  - id: base:volcanic_scrub
    name: "Volcanic Scrub"
    tileId: base:volcanic_rock
    elevationMin: 0.68
    elevationMax: 0.82
    moistureMin: 0.00
    moistureMax: 0.40
    walkable: true
    tags: [natural, volcanic, highland, arid]

  # Wet highland: cloud forest / misty ridge
  - id: base:cloud_forest
    name: "Cloud Forest"
    tileId: base:cloud_forest
    elevationMin: 0.68
    elevationMax: 0.82
    moistureMin: 0.55
    moistureMax: 1.00
    walkable: true
    tags: [natural, tropical, wet, highland, forest, dense]

  # ── Peaks  (0.82 - 1.00) ──────────────────────────────────────────
  # Catch-all: bare rock / mountain peaks (impassable)
  - id: base:mountains
    name: "Mountains"
    tileId: base:wall
    elevationMin: 0.82
    elevationMax: 1.00
    walkable: false
    tags: [natural, impassable, peak]

  # Wet peak: moss-covered high crags -- still impassable but visually distinct
  - id: base:mossy_peaks
    name: "Mossy Peaks"
    tileId: base:mossy_rock
    elevationMin: 0.82
    elevationMax: 1.00
    moistureMin: 0.60
    moistureMax: 1.00
    walkable: false
    tags: [natural, impassable, peak, wet]

  # ── Volcano Summits  (stamped in code; elevation pushed above 1.0) ─────
  - id: base:volcanic_summit
    name: "Volcanic Summit"
    tileId: base:volcanic_peak
    elevationMin: 1.00
    elevationMax: 99.0
    walkable: false
    tags: [natural, impassable, peak, volcanic]