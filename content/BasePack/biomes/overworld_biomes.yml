# content/BasePack/biomes/overworld_biomes.yml
# Biome definitions for island generation.
# Sorted by elevationMax ascending. The island mask guarantees all
# edge tiles have near-zero elevation, so they always fall into deep_water.
# The two coastal biomes (shallow_water, beach) create layered shorelines.

schema: biome_defs.v1
biomes:
  - id: base:deep_water
    name: "Deep Water"
    tileId: base:water
    elevationMax: 0.22
    walkable: false
    tags: [natural, liquid]

  - id: base:shallow_water
    name: "Shallow Water"
    tileId: base:shallow_water
    elevationMax: 0.30
    walkable: false
    tags: [natural, liquid, shallow, coastal]

  - id: base:beach
    name: "Beach"
    tileId: base:beach
    elevationMax: 0.37
    walkable: true
    tags: [natural, coastal]

  - id: base:grassland
    name: "Grassland"
    tileId: base:grass
    elevationMax: 0.58
    walkable: true
    tags: [natural, temperate]

  - id: base:dirt_hills
    name: "Dirt Hills"
    tileId: base:dirt
    elevationMax: 0.75
    walkable: true
    tags: [natural, highland]

  - id: base:mountains
    name: "Mountains"
    tileId: base:wall
    elevationMax: 1.00
    walkable: false
    tags: [natural, impassable]