# content/BasePack/biomes/overworld_biomes.yml
#
# Three-axis biome table: elevation x moisture x temperature.
#
# LOOKUP: The generator picks the MOST SPECIFIC (narrowest combined moisture+temperature
# range) biome whose elevation, moisture AND temperature all match.
# Biomes with moisture/temperature spanning 0..1 act as catch-alls for their band.
#
# ELEVATION BANDS (tuned for raw masked noise -- no contrast stretch in chunk mode):
#   0.00 - 0.18   deep ocean
#   0.18 - 0.26   shallow water / reef
#   0.26 - 0.34   beach / shoreline
#   0.34 - 0.46   low land
#   0.46 - 0.60   mid land
#   0.60 - 0.74   highland
#   0.74 - 1.00   peaks (impassable)
#   1.00+         volcanic summit (stamped in code)
#
# MOISTURE:  0.0=dry/arid  0.5=mixed  1.0=wet/tropical
# TEMPERATURE: 0.0=cold  0.5=temperate  1.0=tropical/hot

schema: biome_defs.v1
biomes:

  # =========================================================
  # OCEAN (elevation-only, no climate filter)
  # =========================================================

  - id: base:deep_water
    name: "Deep Ocean"
    tileId: base:water
    elevationMin: 0.00
    elevationMax: 0.18
    walkable: false
    tags: [natural, liquid, ocean, deep]

  - id: base:shallow_water
    name: "Shallow Water"
    tileId: base:shallow_water
    elevationMin: 0.18
    elevationMax: 0.26
    walkable: false
    tags: [natural, liquid, shallow, coastal]

  # =========================================================
