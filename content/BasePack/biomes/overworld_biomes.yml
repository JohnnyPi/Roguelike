  - id: base:beach
    name: "Beach"
    tileId: base:beach
    elevationMin: 0.26
    elevationMax: 0.34
    moistureMin: 0.00
    moistureMax: 1.00
    temperatureMin: 0.00
    temperatureMax: 1.00
    walkable: true
    tags: [natural, coastal]

  # Dry leeward coast: rocky cliff (dry + any temp)
