# content/BasePack/dungeons/cave_basic.yml
# Basic cave dungeon blueprint (Phase A — config only, not full pipeline yet).
# Values here replace the hardcoded properties in DungeonGenerator
# and the magic numbers in Game1.EnterDungeon().

schema: dungeon_blueprint.v1
id: base:cave_basic
name: "Basic Cave"
tags: [cave, natural, earlygame]
requires: []

defaults:
  seedSalt: "cave_basic"
  difficulty:
    depthMin: 1
    depthMax: 5
    threatBudgetMin: 6
    threatBudgetMax: 12

  size:
    grid:
      widthMin: 50
      widthMax: 70
      heightMin: 35
      heightMax: 45
    targetFloorRatioMin: 0.28
    targetFloorRatioMax: 0.45

  rooms:
    minRooms: 6
    maxRooms: 12
    roomMinSize: 5
    roomMaxSize: 10
    maxPlacementAttempts: 200

  connectivity:
    mustBeConnected: true
    allowLoops: true
    loopChance: 0.25

  entranceExit:
    requireEntrance: true
    requireExit: true
    preferFarthestExit: true

  population:
    itemsPerRoom: "0..2"
    chestChance: 0.40
    monsterTableId: base:spawn_cave_monsters
    itemTableId: base:loot_cave_common