# content/BasePack/tiles/overworld_tiles.yml
#
# Overworld-specific tile definitions for the two-axis biome system.
# These complement the base tiles in base_tiles.yml (grass, dirt, wall, water, beach).
#
# Height guide (matches TileDef.Height):
#   0 = water / sea level
#   1 = lowland (beach, flat ground, jungle floor)
#   2 = midland (forest, savanna, scrub)
#   3 = highland (hills, cloud forest, volcanic rock)
#   4 = peak (impassable crags, moss-covered summits)
#
# Color intent:
#   Dry/arid biomes  -> warm yellows, tans, oranges
#   Wet/tropical     -> deep saturated greens, blue-greens
#   Highland         -> cooler greens, greys, purples
#   Volcanic         -> dark charcoal, rust reds

schema: tile_defs.v1
tiles:

  # ── Shoreline ────────────────────────────────────────────────────────
  - id: base:rocky_cliff
    name: "Rocky Cliffs"
    walkable: false
    color: "#5C4A3A"
    sprite: ""
    blocksSight: true
    height: 2
    tags: [natural, overworld, coastal, cliff, impassable]

  - id: base:mangrove
